<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="title">Krafslösaskogen Survey</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" crossorigin=""/>
  <style>
    :root{--green:#2d8a47;--green-dark:#235f33;--blue:#4facfe;--card:#fff;--text:#24303a;--muted:#5b6470;--border:#dbe5df}
    *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;color:var(--text);background:linear-gradient(135deg,var(--green),var(--blue));min-height:100vh;padding:16px}
    .language-switcher{text-align:center;margin-bottom:16px}.language-switcher button{background:#fff;border:2px solid var(--green);padding:10px 18px;margin:0 5px;border-radius:999px;cursor:pointer;font-weight:700}.language-switcher button.active,.language-switcher button:hover{background:var(--green);color:#fff}
    .container{max-width:1000px;margin:0 auto;background:rgba(255,255,255,.96);border-radius:18px;padding:20px;box-shadow:0 16px 40px rgba(0,0,0,.12)}
    h1{margin:0 0 18px;text-align:center;color:var(--green-dark);border-bottom:3px solid var(--green);padding-bottom:14px} h2{margin:24px 0 10px;color:var(--green-dark);border-left:5px solid var(--green);padding-left:12px} p{line-height:1.55}
    .panel,.question{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}.question-title{font-weight:700;margin:0 0 10px;color:var(--green-dark)}.hint{color:var(--muted);font-size:14px}.contact-block{white-space:pre-line}
    .likert{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:10px}.likert label{display:block;border:1px solid var(--border);border-radius:10px;padding:10px;background:#fbfdfb;cursor:pointer}
    .matrix-list{display:grid;gap:12px}.matrix-card{border:1px solid var(--border);border-radius:12px;padding:12px;background:#fcfffd}.matrix-card .matrix-title{font-weight:700;margin-bottom:8px}.matrix-options{display:grid;grid-template-columns:repeat(5,minmax(56px,1fr));gap:8px}.matrix-options label{border:1px solid var(--border);border-radius:10px;padding:8px 6px;background:#fff;text-align:center;font-size:13px;cursor:pointer}
    .demographics-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}.field label{display:block;font-weight:700;margin-bottom:6px}.field select,.field input[type="text"]{width:100%;padding:11px 12px;border:1px solid #cfd8d2;border-radius:10px;font-size:15px;background:#fff}
    .map-container{height:420px;border-radius:14px;overflow:hidden;border:1px solid var(--border);margin-top:10px}.map{width:100%;height:100%}
    .pin-counter{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:8px 0}.pill{display:inline-block;padding:5px 10px;border-radius:999px;background:#fff;border:1px solid var(--border);font-size:13px}
    .mini-btn,.submit-btn{background:linear-gradient(45deg,var(--green),var(--blue));color:#fff;border:none;border-radius:999px;cursor:pointer;font-weight:700}.mini-btn{padding:9px 14px}.submit-btn{display:block;margin:28px auto 8px;padding:15px 34px;font-size:18px}
    #message{display:none;padding:12px 14px;border-radius:12px;font-weight:700;margin:10px 0}#message.success{display:block;background:#d4edda;color:#155724}#message.error{display:block;background:#f8d7da;color:#721c24}
    .image-wrap{text-align:center;margin-top:10px}.image-wrap img{max-width:100%;height:auto;border-radius:12px;border:1px solid var(--border)}.image-fallback{padding:18px;border:2px dashed var(--border);border-radius:12px;color:var(--muted)}
    @media (max-width:700px){body{padding:8px}.container{padding:14px}h1{font-size:26px}.likert{grid-template-columns:1fr 1fr}.matrix-options{grid-template-columns:1fr;gap:6px}.matrix-options label{text-align:left}.map-container{height:360px}.submit-btn{width:100%}}
  </style>
</head>
<body>
  <div class="language-switcher">
    <button id="lang-en" onclick="switchLanguage('en')" class="active">English</button>
    <button id="lang-sv" onclick="switchLanguage('sv')">Svenska</button>
  </div>

  <div class="container">
    <h1 data-i18n="main_title">KRAFLÖSASKOGEN / SNURROM SURVEY</h1>
    <div id="message"></div>

    <div class="panel">
      <p data-i18n="welcome_1"></p>
      <p data-i18n="welcome_2"></p>
      <p data-i18n="welcome_3"></p>
      <p data-i18n="welcome_4"></p>

      <p class="hint contact-block" data-i18n="contacts"></p>
      <h2 data-i18n="consent_title">Consent to participate in research</h2>
      <div class="question" style="background:#fffaf2;border-left:5px solid #d69e2e;">
        <p class="question-title" data-i18n="consent_label"></p>
        <p data-i18n="consent_1"></p>
        <p data-i18n="consent_2"></p>
        <p data-i18n="consent_3"></p>
        <p data-i18n="consent_4"></p>
      </div>
    </div>

    <form id="survey-form" onsubmit="event.preventDefault(); submitForm();">
      <h2 data-i18n="sec1_title"></h2>
      <div class="question">
        <p class="question-title" data-i18n="q1_title"></p>
        <p class="hint" data-i18n="q1_hint"></p>
        <div class="image-wrap">
          <img src="/nature-connectedness.jpg" alt="Nature connectedness scale" onerror="this.style.display='none';document.getElementById('img-fallback').style.display='block';">
          <div id="img-fallback" class="image-fallback" style="display:none" data-i18n="img_fallback"></div>
        </div>
        <div id="q1-overlap" class="likert"></div>
      </div>

      <h2 data-i18n="bond_title"></h2>
      <p class="hint" data-i18n="scale7_hint"></p>
      <div id="bond-section"></div>

      <h2 data-i18n="func_title"></h2>
      <p class="hint" data-i18n="func_desc"></p>
      <p class="hint" data-i18n="scale5_hint"></p>
      <div id="func-section" class="matrix-list"></div>

      <h2 data-i18n="routine_title"></h2>
      <p class="hint" data-i18n="scale7_hint"></p>
      <div id="routine-section"></div>

      <h2 data-i18n="multi_title"></h2>
      <p class="hint" data-i18n="scale7_hint"></p>
      <div id="multi-section"></div>

      <h2 data-i18n="map_title"></h2>
      <div class="question">
        <p class="question-title" data-i18n="map_instructions_title"></p>
        <p data-i18n="map_instructions_p"></p>
        <div class="pin-counter">
          <div>
            <span class="pill" data-i18n="pin_rule"></span>
            <span class="pill"><span data-i18n="pins_added"></span>: <strong id="pin-count">0</strong></span>
          </div>
          <div>
            <button type="button" class="mini-btn" onclick="clearPins()" data-i18n="clear_pins"></button>
            <button type="button" class="mini-btn" onclick="removeLastPin()" data-i18n="remove_last_pin"></button>
          </div>
        </div>
        <div class="map-container"><div id="map" class="map"></div></div>
        <p class="hint" data-i18n="map_hint"></p>
      </div>

      <h2 data-i18n="demo_title"></h2>
      <div id="demographics" class="demographics-grid"></div>

      <div class="question">
        <p class="question-title" data-i18n="thanks_title"></p>
        <p data-i18n="thanks_p"></p>
      </div>

      <button class="submit-btn" type="submit" data-i18n="submit"></button>
    </form>
  </div>

  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" crossorigin=""></script>
  <script src="/app.js"></script>
</body>
</html>
